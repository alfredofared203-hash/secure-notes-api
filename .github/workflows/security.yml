name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run npm audit
        run: npm audit

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: Build Docker Image
        run: docker build -t secure-notes .

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secure-notes

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform