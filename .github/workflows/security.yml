name: 1. SCA - NPM Audit Scan

on:
  push:
    branches: [ "main", "master" ]

jobs:
  npm-audit-job:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: npm install

      - name: Run npm Audit
        run: npm audit