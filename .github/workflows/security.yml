name: DevSecOps Pipeline

on:
  push:
    branches: [main]

jobs:
  npm-audit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check Versions
        run: |
          node -v
          npm -v

      - name: Install Dependencies
        run: npm ci

      - name: Run npm Audit
        run: npm audit